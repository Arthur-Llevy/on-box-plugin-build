name: Compilar Plugin Revit

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Baixar o código
      uses: actions/checkout@v4
    - name: Configurar o MSBuild
      uses: microsoft/setup-msbuild@v1
    - name: Compilar a Solução
      run: msbuild ONBOXApp.sln /p:Configuration=Release
    - name: Fazer upload do plugin compilado
      uses: actions/upload-artifact@v4
      with:
        name: OnboxApp.bundle
        path: bin\Release\OnboxApp.bundle