name: Compilar Onbox para Revit 2023

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Baixar o código fonte
      uses: actions/checkout@v4

    - name: Configurar MSBuild
      uses: microsoft/setup-msbuild@v1

    - name: Restaurar pacotes NuGet da solução
      run: nuget restore ONBOXApp.sln

    - name: Instalar pacote Revit API (RevitAPI + RevitAPIUI)
      run: |
        nuget install Revit_All_Main_Versions_API_x64 -Version 2023.0.0 -OutputDirectory packages

    - name: Copiar DLLs do Revit para a pasta do projeto
      run: |
        copy packages\Revit_All_Main_Versions_API_x64.2023.0.0\lib\net48\RevitAPI.dll ONBOXApp\
        copy packages\Revit_All_Main_Versions_API_x64.2023.0.0\lib\net48\RevitAPIUI.dll ONBOXApp\
        copy RevitAPIIFC.dll ONBOXApp\

    - name: Compilar para Revit 2023 (Release)
      run: msbuild ONBOXApp\ONBOXApp.csproj /p:Configuration=Release2023 /p:Platform=x64 /p:OutputPath=bin\x64\Release2023\

    - name: Listar arquivos gerados (debug)
      run: dir ONBOXApp\bin\x64\Release2023\

    - name: Criar estrutura do bundle (OnboxApp.bundle)
      run: |
        $bundlePath = "OnboxApp.bundle\Contents\2023\ONBOX"
        if (-not (Test-Path $bundlePath)) {
            New-Item -ItemType Directory -Path $bundlePath -Force
        }
        Copy-Item -Path "ONBOXApp\bin\x64\Release2023\*" -Destination $bundlePath -Recurse -Force
        Copy-Item -Path "ONBOXApp\ONBOXApp.addin" -Destination "OnboxApp.bundle\Contents\2023\"

    - name: Fazer upload do bundle compilado
      uses: actions/upload-artifact@v4
      with:
        name: OnboxApp_Revit2023
        path: OnboxApp.bundle