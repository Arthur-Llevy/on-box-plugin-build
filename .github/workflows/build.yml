name: Compilar Onbox para Revit 2023

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Baixar o código fonte
      uses: actions/checkout@v4

    - name: Configurar MSBuild
      uses: microsoft/setup-msbuild@v1

    - name: Restaurar pacotes NuGet da solução
      run: nuget restore ONBOXApp.sln

    - name: Instalar pacote Revit API
      run: |
        nuget install Revit_All_Main_Versions_API_x64 -Version 2023.0.0 -OutputDirectory packages

    - name: Copiar DLLs do Revit para a raiz do projeto
      run: |
        copy packages\Revit_All_Main_Versions_API_x64.2023.0.0\lib\net48\RevitAPI.dll .
        copy packages\Revit_All_Main_Versions_API_x64.2023.0.0\lib\net48\RevitAPIUI.dll .

    - name: Compilar para Revit 2023 (Release)
      run: msbuild ONBOXApp.csproj /p:Configuration=Release2023 /p:Platform="Any CPU" /p:OutputPath=bin\Release2023\

    - name: Listar arquivos gerados (debug)
      run: dir bin\Release2023\

    - name: Criar estrutura do bundle
      run: |
        if not exist "OnboxApp.bundle\Contents\2023\ONBOX" mkdir "OnboxApp.bundle\Contents\2023\ONBOX"
        xcopy "bin\Release2023\*" "OnboxApp.bundle\Contents\2023\ONBOX\" /Y /R /F /I /S
        copy "ONBOXApp.addin" "OnboxApp.bundle\Contents\2023\"

    - name: Fazer upload do bundle
      uses: actions/upload-artifact@v4
      with:
        name: OnboxApp_Revit2023
        path: OnboxApp.bundle